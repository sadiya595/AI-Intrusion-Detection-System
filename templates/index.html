<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Intrusion Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-2xl">
        
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">
            🚀 AI Intrusion Detection System
        </h1>

        <form action="/predict" method="post" class="grid grid-cols-2 gap-4">

            <input type="number" name="count" placeholder="Count" class="input">
            <input type="number" step="0.01" name="dst_host_diff_srv_rate" placeholder="Diff Service Rate" class="input">

            <input type="number" step="0.01" name="dst_host_same_src_port_rate" placeholder="Same Src Port Rate" class="input">
            <input type="number" step="0.01" name="dst_host_same_srv_rate" placeholder="Same Service Rate" class="input">

            <input type="number" name="dst_host_srv_count" placeholder="Service Count" class="input">
            <input type="number" step="0.01" name="same_srv_rate" placeholder="Same Service Rate (count)" class="input">

            <input type="number" step="0.01" name="serror_rate" placeholder="Serror Rate" class="input">
            <input type="number" name="logged_in" placeholder="Logged In (0 or 1)" class="input">

            <select name="status" class="input">
                <option value="Normal">Normal</option>
                <option value="Error">Error</option>
            </select>

            <select name="flag" class="input">
                <option value="SF">SF</option>
                <option value="REJ">REJ</option>
            </select>

            <select name="service" class="input col-span-2">
                <option value="Yes">HTTP</option>
                <option value="No">Non-HTTP</option>
            </select>

            <button type="submit" class="col-span-2 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Predict
            </button>
        </form>

        <hr class="my-6">

<h2 class="text-lg font-semibold mb-2">📂 Upload CSV for Bulk Prediction</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" class="mb-3">
    
    <button type="submit" 
        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
        Upload & Predict
    </button>
</form>
        {% if prediction %}
        <div class="mt-6 text-center">
            <h2 class="text-xl font-semibold text-gray-700">
                Prediction: 
                <span class="text-blue-600">{{ prediction }}</span>
            </h2>
        </div>
        {% endif %}

    </div>
</div>

<style>
.input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 100%;
}
</style>

</body>
</html>
